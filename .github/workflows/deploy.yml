name: Deploy to Hugging Face Space

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.8

      - name: Install dependencies
        run: |
          pip install huggingface_hub

      - name: Login to Hugging Face
        run: |
          echo "HF_TOKEN=${{ secrets.HF_TOKEN }}" > .env
          hf auth login --token ${{ secrets.HF_TOKEN }} --add-to-git-credential

      - name: Deploy to Hugging Face Space
        run: |
          python -c "from huggingface_hub import HfApi; api = HfApi(); api.create_repo(repo_id='Naseha/sila-workspace', repo_type='space', space_sdk='docker', private=False, exist_ok=True);"
          git config --global user.email "naseha.s@gmail.com"
          git config --global user.name "Naseha"
          git remote set-url origin https://hf_token:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/Naseha/sila-workspace